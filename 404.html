<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | Ryann Lynn Murphy</title>
  <meta name="description" content="Page not found. Return to Ryann Lynn Murphy's portfolio.">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/effects.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-lg);
    }
    .error-box {
      max-width: 480px;
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: 4rem;
      color: var(--black);
      line-height: 1;
      margin-bottom: var(--space-sm);
    }
    .error-msg {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: var(--space-xl);
    }
    .error-details {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-light);
      text-align: left;
      border: 1px solid var(--border);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
      line-height: 1.8;
    }
    .error-nav {
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }
    .error-nav a {
      display: block;
      margin-bottom: var(--space-sm);
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="error-box">
      <div class="error-code">404</div>
      <div class="error-msg">FILE NOT FOUND</div>

      <div class="error-details">
        C:\ryann&gt; cd requested_page<br>
        ERROR: The system cannot find the path specified.<br>
        <br>
        Verify the file exists and try again.<br>
        Or maybe it never existed. Who's to say.
      </div>

      <div class="error-nav">
        <a href="index.html">&rarr; Return to landing</a>
        <a href="about.html">&rarr; Go to main site</a>
        <a href="contact.html">&rarr; Contact Ryann</a>
      </div>
    </div>
  </div>
  <script src="js/easter-eggs.js"></script>
</body>
</html>
